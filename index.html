const EMAILJS_SERVICE_ID="service_xkjncnn";
const EMAILJS_TEMPLATE_ID="template_bgbetpg";
const EMAILJS_PUBLIC_KEY="Wb5IBL224ffdAFx0B";
const OWNER_EMAIL="mohanhypo1801@gmail.com";

const COLORS={income:"#1D9E75",expense:"#D85A30",savings:"#378ADD",goal:"#7F77DD"};
const PIE_COLORS=["#378ADD","#D85A30","#BA7517","#7F77DD","#1D9E75","#993C1D","#534AB7","#0F6E56","#9ca3af","#185FA5"];
const DEFAULT_CATS={
  income:["Salary","Business","Freelance","Rental","Investment","Other"],
  expense:["Food","Transport","Housing","Healthcare","Education","Entertainment","Shopping","Utilities","EMI/Loan","Other"]

const INVEST_OPTIONS=[
  {name:"SIP / Mutual Fund",risk:"Medium",returns:"10-14%",horizon:"3+ years",color:"#378ADD"},
  {name:"PPF",risk:"Low",returns:"7.1%",horizon:"15 years",color:"#1D9E75"},

];

const fmt=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const fmtC=n=>{if(n>=10000000)return"₹"+(n/10000000).toFixed(2)+"Cr";if(n>=100000)return"₹"+(n/100000).toFixed(2)+"L";return fmt(n);};
const pct=(a,b)=>b===0?0:Math.round((a/b)*100);
const iStyle={padding:"9px 10px",borderRadius:8,border:"0.5px solid #dde3ea",fontSize:14,background:"#f8fafc",color:"#1a1a1a",width:"100%"};

const initState={

  members:[{id:1,name:"Me",relation:"Self"}],
  transactions:[],goals:[],feedbacks:[],
  customCats:{income:[],expense:[]}
};
function load(){try{const d=localStorage.getItem("mofolio4");return d?{...initState,...JSON.parse(d)}:initState;}catch{return initState;}}

// ── HELPERS ──
function ResultRow({label,value,highlight}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"0.5px solid #f0f4f8"}}>
    <span style={{fontSize:13,color:"#6b7280"}}>{label}</span>
    <span style={{fontSize:highlight?18:14,fontWeight:highlight?500:400,color:highlight?"#185FA5":"#1a1a1a"}}>{value}</span>
  </div>;
}
function SliderRow({label,value,min,max,step,onChange,display}){
  return <div style={{marginBottom:14}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
      <span style={{color:"#6b7280"}}>{label}</span>
      <span style={{fontWeight:500,color:"#185FA5"}}>{display||value}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))} style={{width:"100%"}}/>
  </div>;
}
function Card({children,mb}){
  return <div style={{background:"#fff",borderRadius:12,border:"0.5px solid #dde3ea",padding:"1rem",marginBottom:mb||"1rem"}}>{children}</div>;
}
function StatCard({label,value,color,sub}){
  return <div style={{background:"#fff",borderRadius:12,border:"0.5px solid #dde3ea",padding:"1rem",flex:1,minWidth:90}}>
    <div style={{fontSize:11,color:"#6b7280",marginBottom:5}}>{label}</div>
    <div style={{fontSize:18,fontWeight:500,color}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:"#9ca3af",marginTop:3}}>{sub}</div>}
  </div>;
}

// ── PIE CHART ──
function PieChart({data,labels,colors,size=160}){
  const ref=useRef();const cRef=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(cRef.current)cRef.current.destroy();
    cRef.current=new Chart(ref.current,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:"#fff",hoverOffset:4}]},options:{responsive:false,cutout:"62%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});
    return()=>{if(cRef.current)cRef.current.destroy();};
  },[data.join(",")]);
  return <canvas ref={ref} width={size} height={size}/>;
}

// ── BAR CHART ──
function BarChart({invested,returns}){
  const ref=useRef();const cRef=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(cRef.current)cRef.current.destroy();
    cRef.current=new Chart(ref.current,{type:"bar",data:{labels:["Invested","Returns","Total"],datasets:[{data:[invested,returns,invested+returns],backgroundColor:["#378ADD","#1D9E75","#185FA5"],borderRadius:6,borderSkipped:false}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtC(c.raw)}}},scales:{y:{ticks:{callback:v=>fmtC(v)},grid:{color:"#f0f4f8"}},x:{grid:{display:false}}}}});
    return()=>{if(cRef.current)cRef.current.destroy();};
  },[invested,returns]);
  return <canvas ref={ref} width={300} height={160}/>;
}

// ── SEVERITY BANNER ──
function SeverityBanner({income,expense}){
  if(!income&&!expense)return null;
  const ratio=income===0?999:expense/income;
  let level,bg,border,tc,icon,msg,sugg;
  if(ratio<=0.5){level="Excellent";bg="#E1F5EE";border="#1D9E75";tc="#085041";icon="✓";msg="Saving 50%+ of income. Outstanding!";sugg=["Increase SIP contributions to accelerate wealth.","Explore NPS for 80CCD(1B) tax benefits.","Consider direct equity for long-term alpha."];}
  else if(ratio<=0.7){level="Healthy";bg="#E6F1FB";border="#378ADD";tc="#0C447C";icon="↑";msg="Expenses 50–70% of income. Good savings buffer.";sugg=["Build a 6-month emergency fund in liquid fund.","Do 10% annual step-up on your SIPs.","Review subscriptions monthly."];}
  else if(ratio<=0.9){level="Caution";bg="#FAEEDA";border="#BA7517";tc="#412402";icon="!";msg="Expenses 70–90% of income. Savings are thin.";sugg=["Cap top 2 expense categories with a monthly limit.","Avoid new EMIs or revolving credit card debt.","Explore side income — freelancing or rental."];}
  else if(ratio<=1){level="Warning";bg="#FAECE7";border="#D85A30";tc="#4A1B0C";icon="⚠";msg="Almost nothing is being saved!";sugg=["Apply 50-30-20 rule immediately.","Pause all non-essential spending for 30 days.","Start ₹500/month SIP — habit > amount."];}
  else{level="Critical";bg="#FCEBEB";border="#A32D2D";tc="#501313";icon="✕";msg=`Deficit of ${fmt(expense-income)}! Expenses exceed income.`;sugg=["Stop all discretionary spending NOW.","Clear highest-interest debt first.","Seek additional income urgently."];}
  return <div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"1rem",marginBottom:"1rem"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
      <span style={{width:26,height:26,borderRadius:"50%",background:border,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{icon}</span>
      <span style={{fontWeight:500,fontSize:14,color:tc}}>Financial Health: {level}</span>
      <span style={{marginLeft:"auto",fontSize:12,color:tc,fontWeight:500}}>{Math.round(ratio*100)}%</span>
    </div>
    <div style={{fontSize:13,color:tc,marginBottom:8}}>{msg}</div>
    {sugg.map((s,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:4}}><span style={{color:border,fontWeight:700,fontSize:11,flexShrink:0}}>{i+1}.</span><span style={{fontSize:12,color:tc,lineHeight:1.5}}>{s}</span></div>)}
  </div>;
}

// ── EXPENSE ANALYSIS ──
function ExpenseAnalysis({transactions}){
  const expenses=transactions.filter(t=>t.type==="expense");
  if(expenses.length<3)return null;
  const byCat={};
  expenses.forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+t.amount;});
  const total=Object.values(byCat).reduce((a,b)=>a+b,0);
  const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const tips={
    "Entertainment":["Cancel unused OTT subscriptions.","Set a monthly entertainment budget."],
    "Shopping":["Wait 48hrs before any non-essential purchase.","Use cashback apps for savings."],
    "Food":["Meal prep to reduce eating out.","Use grocery lists to avoid impulse buying."],
    "Transport":["Carpool or use public transport when possible.","Compare fuel prices nearby."],
    "Utilities":["Switch to LED bulbs to cut electricity bills.","Unplug devices when not in use."],
    "EMI/Loan":["Consider balance transfer to lower interest rate.","Prepay loans when you have surplus."],
  };
  const unwanted=sorted.filter(([cat,amt])=>pct(amt,total)>15&&["Entertainment","Shopping","Food"].includes(cat));
  if(unwanted.length===0&&sorted.length>0){
    return <Card><div style={{fontWeight:500,marginBottom:8}}>Spending analysis</div><div style={{fontSize:13,color:"#1D9E75"}}>Your spending looks well distributed. Keep it up!</div></Card>;
  }
  return <Card><div style={{fontWeight:500,marginBottom:10}}>Spending analysis & tips</div>
    {unwanted.map(([cat,amt])=><div key={cat} style={{marginBottom:12,padding:"10px",background:"#FAEEDA",borderRadius:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontWeight:500,fontSize:13,color:"#412402"}}>{cat} — {pct(amt,total)}% of expenses</span>
        <span style={{fontSize:13,fontWeight:500,color:"#D85A30"}}>{fmt(amt)}</span>
      </div>
      {(tips[cat]||[]).map((tip,i)=><div key={i} style={{fontSize:12,color:"#633806",marginTop:3}}>• {tip}</div>)}
    </div>)}
  </Card>;
}

// ── CALENDAR ──
function CalendarPicker({value,onChange}){
  const[open,setOpen]=useState(false);
  const d=value?new Date(value):new Date();
  const[view,setView]=useState({y:d.getFullYear(),m:d.getMonth()});
  const days=["Su","Mo","Tu","We","Th","Fr","Sa"];
  const first=new Date(view.y,view.m,1).getDay();
  const total=new Date(view.y,view.m+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let i=1;i<=total;i++)cells.push(i);
  const select=(day)=>{
    const dt=`${view.y}-${String(view.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    onChange(dt);setOpen(false);
  };
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return <div style={{position:"relative"}}>
    <div onClick={()=>setOpen(!open)} style={{...iStyle,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span>{value||"Select date"}</span><span style={{color:"#185FA5",fontSize:16}}>▾</span>
    </div>
    {open&&<div style={{position:"absolute",top:"100%",left:0,zIndex:999,background:"#fff",border:"0.5px solid #dde3ea",borderRadius:12,padding:"12px",width:260,boxShadow:"0 4px 20px rgba(0,0,0,0.12)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>setView(v=>({...v,m:v.m===0?11:v.m-1,y:v.m===0?v.y-1:v.y}))} style={{background:"none",border:"none",fontSize:18,color:"#185FA5",padding:"0 4px"}}>‹</button>
        <span style={{fontWeight:500,fontSize:13}}>{months[view.m]} {view.y}</span>
        <button onClick={()=>setView(v=>({...v,m:v.m===11?0:v.m+1,y:v.m===11?v.y+1:v.y}))} style={{background:"none",border:"none",fontSize:18,color:"#185FA5",padding:"0 4px"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
        {days.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:"#9ca3af",padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((day,i)=>{
          if(!day)return <div key={i}/>;
          const dt=`${view.y}-${String(view.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const sel=dt===value;
          return <button key={i} onClick={()=>select(day)} style={{padding:"5px 0",borderRadius:6,border:"none",background:sel?"#185FA5":"transparent",color:sel?"#fff":"#1a1a1a",fontSize:12,cursor:"pointer"}}>{day}</button>;
        })}
      </div>
    </div>}
  </div>;
}

// ── PROFILE ──
function Profile({state,setState,setTab}){
  const[form,setForm]=useState({name:state.profile?.name||"",avatar:state.profile?.avatar||""});
  const save2=()=>{setState(s=>({...s,profile:{...s.profile,name:form.name,avatar:form.avatar}}));alert("Profile saved!");};
  const initials=form.name?form.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2):"?";
  const totalIncome=state.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense=state.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  return <div>
    <Card>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"1rem 0"}}>
        <div style={{width:80,height:80,borderRadius:"50%",background:"#185FA5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:500,color:"#fff",marginBottom:12}}>{initials}</div>
        <div style={{fontSize:18,fontWeight:500,marginBottom:4}}>{form.name||"Your Name"}</div>
        <div style={{fontSize:13,color:"#6b7280"}}>MoFolio Member</div>
      </div>
      <div style={{borderTop:"0.5px solid #dde3ea",paddingTop:12,marginTop:4}}>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>Display name</div>
        <input placeholder="Enter your name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={{...iStyle,marginBottom:12}}/>
        <button onClick={save2} style={{width:"100%",background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontWeight:500}}>Save Profile</button>
      </div>
    </Card>
    <div style={{display:"flex",gap:10,marginBottom:"1rem"}}>
      <StatCard label="Total Income" value={fmtC(totalIncome)} color={COLORS.income}/>
      <StatCard label="Total Expense" value={fmtC(totalExpense)} color={COLORS.expense}/>
      <StatCard label="Transactions" value={state.transactions.length} color="#185FA5"/>
    </div>
    <Card>
      <div style={{fontWeight:500,marginBottom:10}}>Custom categories</div>
      <CustomCategories state={state} setState={setState}/>
    </Card>
  </div>;
}

// ── CUSTOM CATEGORIES ──
function CustomCategories({state,setState}){
  const[type,setType]=useState("income");
  const[newCat,setNewCat]=useState("");
  const custom=state.customCats||{income:[],expense:[]};
  const add=()=>{
    if(!newCat.trim())return;
    setState(s=>({...s,customCats:{...custom,[type]:[...(custom[type]||[]),newCat.trim()]}}));
    setNewCat("");
  };
  const del=(t,c)=>setState(s=>({...s,customCats:{...custom,[t]:(custom[t]||[]).filter(x=>x!==c)}}));
  const allCats=[...DEFAULT_CATS[type],..,(custom[type]||[])];
  return <div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      {["income","expense"].map(tp=><button key={tp} onClick={()=>setType(tp)} style={{flex:1,padding:"7px",border:"0.5px solid",borderRadius:8,fontSize:13,fontWeight:500,background:type===tp?"#185FA5":"transparent",color:type===tp?"#fff":"#6b7280",borderColor:type===tp?"#185FA5":"#dde3ea",textTransform:"capitalize"}}>{tp}</button>)}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:10}}>
      <input placeholder="Add custom category" value={newCat} onChange={e=>setNewCat(e.target.value)} style={{...iStyle,flex:1}}/>
      <button onClick={add} style={{background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"0 14px",fontWeight:500,whiteSpace:"nowrap"}}>+ Add</button>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
      {allCats.map(cat=>{
        const isCustom=(custom[type]||[]).includes(cat);
        return <span key={cat} style={{padding:"4px 10px",borderRadius:20,background:isCustom?"#E6F1FB":"#f0f4f8",fontSize:12,color:isCustom?"#185FA5":"#6b7280",display:"flex",alignItems:"center",gap:4}}>
          {cat}{isCustom&&<button onClick={()=>del(type,cat)} style={{background:"none",border:"none",color:"#D85A30",fontSize:14,padding:0,cursor:"pointer",lineHeight:1}}>×</button>}
        </span>;
      })}
    </div>
  </div>;
}

// ── DASHBOARD ──
function Dashboard({state,totalIncome,totalExpense,savings,setTab}){
  const savingsRate=pct(savings,totalIncome);
  const byMember=state.members.map(m=>{
    const inc=state.transactions.filter(t=>t.memberId===m.id&&t.type==="income").reduce((s,t)=>s+t.amount,0);
    const exp=state.transactions.filter(t=>t.memberId===m.id&&t.type==="expense").reduce((s,t)=>s+t.amount,0);
    return{...m,inc,exp};
  });
  const expByCat={};
  state.transactions.filter(t=>t.type==="expense").forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
  const topCats=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
  const profile=state.profile||{};
  const initials=profile.name?profile.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2):"?";
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1rem",background:"#fff",borderRadius:12,border:"0.5px solid #dde3ea",padding:"0.75rem 1rem"}}>
      <div style={{width:40,height:40,borderRadius:"50%",background:"#185FA5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:500,color:"#fff",flexShrink:0}}>{initials}</div>
      <div><div style={{fontWeight:500}}>{profile.name||"Welcome!"}</div><div style={{fontSize:12,color:"#6b7280"}}>Your financial overview</div></div>
      <button onClick={()=>setTab("profile")} style={{marginLeft:"auto",background:"none",border:"0.5px solid #dde3ea",borderRadius:8,padding:"5px 10px",fontSize:12,color:"#185FA5"}}>Profile</button>
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:"1rem"}}>
      <StatCard label="Total Income" value={fmt(totalIncome)} color={COLORS.income}/>
      <StatCard label="Total Expenses" value={fmt(totalExpense)} color={COLORS.expense}/>
      <StatCard label="Net Savings" value={fmt(savings)} color={savings>=0?COLORS.savings:COLORS.expense} sub={`${savingsRate}% saved`}/>
    </div>
    <SeverityBanner income={totalIncome} expense={totalExpense}/>
    {state.transactions.length===0?
      <Card><div style={{textAlign:"center",padding:"1rem"}}>
        <div style={{fontSize:15,marginBottom:8,color:"#6b7280"}}>No transactions yet</div>
        <button onClick={()=>setTab("transactions")} style={{background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontSize:14}}>Add first transaction</button>
      </div></Card>:<>
      <ExpenseAnalysis transactions={state.transactions}/>
      {topCats.length>0&&<Card>
        <div style={{fontWeight:500,marginBottom:12}}>Expense breakdown</div>
        <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <PieChart data={topCats.map(([,v])=>v)} labels={topCats.map(([k])=>k)} colors={PIE_COLORS}/>
          <div style={{flex:1,minWidth:130}}>
            {topCats.slice(0,6).map(([cat,amt],i)=><div key={cat} style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
              <div style={{width:8,height:8,borderRadius:2,background:PIE_COLORS[i%PIE_COLORS.length],flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                  <span style={{color:"#374151"}}>{cat}</span><span style={{fontWeight:500}}>{pct(amt,totalExpense)}%</span>
                </div>
                <div style={{background:"#f0f4f8",borderRadius:4,height:3,marginTop:2}}>
                  <div style={{width:`${pct(amt,totalExpense)}%`,height:3,borderRadius:4,background:PIE_COLORS[i%PIE_COLORS.length]}}/>
                </div>
              </div>
            </div>)}
          </div>
        </div>
      </Card>}
      {totalIncome>0&&<Card>
        <div style={{fontWeight:500,marginBottom:10}}>Income vs Expenses</div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>

function Goals({state,setState,savings}){
  const[form,setForm]=useState({name:"",target:"",saved:"",horizon:"short",years:3,priority:"medium",startDate:new Date().toISOString().split("T")[0]});
  const add=()=>{
    if(!form.name||!form.target)return;
    setState(s=>({...s,goals:[...s.goals,{...form,id:Date.now(),target:parseFloat(form.target),saved:parseFloat(form.saved)||0}]}));
    setForm({name:"",target:"",saved:"",horizon:"short",years:3,priority:"medium",startDate:new Date().toISOString().split("T")[0]});
  };
  const del=(id)=>setState(s=>({...s,goals:s.goals.filter(g=>g.id!==id)}));
  const updateSaved=(id,val)=>setState(s=>({...s,goals:s.goals.map(g=>g.id===id?{...g,saved:parseFloat(val)||0}:g)}));
  const mn=(g)=>{const rem=g.target-(g.saved||0);const months=g.years*12;return rem>0&&months>0?rem/months:0;};
  const daysLeft=(g)=>Math.max(0,Math.ceil(((g.saved||0)<g.target?(g.target-(g.saved||0))/(g.target/(g.years*365)):0)));
  const priColors={high:{bg:"#FCEBEB",tc:"#A32D2D",bc:"#E24B4A"},medium:{bg:"#FAEEDA",tc:"#633806",bc:"#BA7517"},low:{bg:"#E1F5EE",tc:"#085041",bc:"#1D9E75"}};
  const motivational=(g)=>{
    const p=pct(g.saved||0,g.target);
    if(p>=100)return{msg:"Goal achieved! 🎉",color:"#1D9E75"};
    if(p>=75)return{msg:`Almost there! Just ${fmt(g.target-(g.saved||0))} more to go!`,color:"#1D9E75"};
    if(p>=50)return{msg:`Halfway there! Keep going — ${pct(g.saved||0,g.target)}% done!`,color:"#378ADD"};
    if(p>=25)return{msg:`Great start! ${pct(g.saved||0,g.target)}% achieved. Stay consistent!`,color:"#BA7517"};
    return{msg:`Every rupee counts. Start small, stay consistent!`,color:"#6b7280"};
  };
  const sorted=[...state.goals].sort((a,b)=>({high:0,medium:1,low:2})[a.priority||"medium"]-({high:0,medium:1,low:2})[b.priority||"medium"]);
  return <div>
    <Card>
      <div style={{fontWeight:500,marginBottom:12}}>Add a goal</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}} className="grid2">
        <input placeholder="Goal name (e.g. New Car)" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={iStyle}/>
        <input type="number" placeholder="Target amount (₹)" value={form.target} onChange={e=>setForm(f=>({...f,target:e.target.value}))} style={iStyle}/>
        <input type="number" placeholder="Already saved (₹)" value={form.saved} onChange={e=>setForm(f=>({...f,saved:e.target.value}))} style={iStyle}/>
        <input type="number" placeholder="Years to achieve" value={form.years} onChange={e=>setForm(f=>({...f,years:parseInt(e.target.value)||1}))} style={iStyle}/>
      </div>
      <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>Priority</div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {["high","medium","low"].map(p=><button key={p} onClick={()=>setForm(f=>({...f,priority:p}))} style={{flex:1,padding:"7px",border:"0.5px solid",borderRadius:8,fontSize:12,fontWeight:500,background:form.priority===p?priColors[p].bc:"transparent",color:form.priority===p?"#fff":priColors[p].tc,borderColor:form.priority===p?priColors[p].bc:priColors[p].bc,textTransform:"capitalize"}}>{p}</button>)}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["short","Short-term"],["long","Long-term"]].map(([v,l])=><button key={v} onClick={()=>setForm(f=>({...f,horizon:v}))} style={{flex:1,padding:"7px",border:"0.5px solid",borderRadius:8,fontSize:13,fontWeight:500,background:form.horizon===v?COLORS.goal:"transparent",color:form.horizon===v?"#fff":"#6b7280",borderColor:form.horizon===v?"transparent":"#dde3ea"}}>{l}</button>)}
      </div>
      <button onClick={add} style={{width:"100%",background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontWeight:500}}>Add Goal</button>
    </Card>
    {sorted.length===0?<div style={{textAlign:"center",color:"#6b7280",padding:"2rem"}}>No goals yet. Add your first goal above!</div>:sorted.map(g=>{
      const p=Math.min(pct(g.saved||0,g.target),100);
      const m=mn(g);const ok=savings>=m;
      const dl=daysLeft(g);
      const mot=motivational(g);
      const pc=priColors[g.priority||"medium"];
      return <Card key={g.id}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div>
            <div style={{fontWeight:500,fontSize:15,marginBottom:4}}>{g.name}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:g.horizon==="short"?"#E1F5EE":"#EEEDFE",color:g.horizon==="short"?"#0F6E56":"#534AB7"}}>{g.horizon==="short"?"Short-term":"Long-term"} · {g.years} yr</span>
              <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:pc.bg,color:pc.tc,textTransform:"capitalize"}}>{g.priority||"medium"} priority</span>
            </div>
          </div>
          <button onClick={()=>del(g.id)} style={{background:"none",border:"none",color:"#9ca3af",fontSize:18}}>×</button>
        </div>

        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
          <span style={{color:"#6b7280"}}>Saved: <strong>{fmt(g.saved||0)}</strong></span>
          <span>Target: <strong>{fmt(g.target)}</strong></span>
        </div>
        <div style={{background:"#f0f4f8",borderRadius:6,height:10,marginBottom:4}}>
          <div style={{width:`${p}%`,height:10,borderRadius:6,background:p>=75?"#1D9E75":p>=40?"#378ADD":"#BA7517",transition:"width 0.4s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6b7280",marginBottom:8}}>
          <span>{p}% complete</span>
          <span>{fmt(Math.max(g.target-(g.saved||0),0))} remaining</span>
        </div>

        <div style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",marginBottom:8,fontSize:12,color:mot.color,fontWeight:500}}>{mot.msg}</div>

        {dl>0&&p<100&&<div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1,background:"#E6F1FB",borderRadius:8,padding:"7px 10px",textAlign:"center"}}>
            <div style={{fontSize:11,color:"#185FA5"}}>Days remaining</div>
            <div style={{fontWeight:500,color:"#0C447C",fontSize:16}}>{dl}</div>
          </div>
          <div style={{flex:1,background:ok?"#E1F5EE":"#FAECE7",borderRadius:8,padding:"7px 10px",textAlign:"center"}}>
            <div style={{fontSize:11,color:ok?"#0F6E56":"#993C1D"}}>Monthly needed</div>
            <div style={{fontWeight:500,color:ok?"#085041":"#712B13",fontSize:14}}>{fmt(m)}</div>
          </div>
        </div>}

        {m>0&&<div style={{background:ok?"#E1F5EE":"#FAECE7",borderRadius:8,padding:"8px 10px",fontSize:12,marginBottom:10}}>
          <span style={{color:ok?"#0F6E56":"#993C1D",fontWeight:500}}>{ok?"On track — you can achieve this!":"Need more savings — consider reducing expenses."}</span>
        </div>}

        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>Update saved:</span>
          <input type="number" defaultValue={g.saved||0} onBlur={e=>updateSaved(g.id,e.target.value)} style={{flex:1,padding:"6px",borderRadius:8,border:"0.5px solid #dde3ea",fontSize:13,background:"#f8fafc",color:"#1a1a1a"}}/>
        </div>
      </Card>;
    })}
  </div>;
}

// ── SIP CALCULATOR ──
function SIPCalc(){
  const[monthly,setMonthly]=useState(5000);
  const[rate,setRate]=useState(12);
  const[years,setYears]=useState(10);
  const[stepUp,setStepUp]=useState(0);
  const res=useMemo(()=>{
    const r=rate/100/12;
    if(stepUp===0){const n=years*12;const fv=monthly*((Math.pow(1+r,n)-1)/r)*(1+r);return{fv,invested:monthly*n,returns:fv-monthly*n};}
    let fv=0,inv=0,m=monthly;
    for(let y=0;y<years;y++){for(let mo=0;mo<12;mo++){fv=(fv+m)*(1+r);inv+=m;}m*=(1+stepUp/100);}
    return{fv,invested:inv,returns:fv-inv};
  },[monthly,rate,years,stepUp]);
  return <div>
    <Card>
      <div style={{fontWeight:500,fontSize:15,color:"#185FA5",marginBottom:14}}>SIP Calculator</div>

// ── PPF CALCULATOR ──
function PPFCalc(){
  const[yearly,setYearly]=useState(150000);
  const[years,setYears]=useState(15);
  const[salaryInc,setSalaryInc]=useState(0);
  const PPF_RATE=7.1;
  const res=useMemo(()=>{
    const r=PPF_RATE/100;
    let bal=0,inv=0,contrib=yearly;
    const rows=[];
    for(let y=1;y<=years;y++){
      bal=(bal+contrib)*(1+r);inv+=contrib;
      rows.push({y,bal,inv,interest:bal-inv,contrib});
      if(salaryInc>0)contrib=Math.min(contrib*(1+salaryInc/100),150000);
    }
    let ext5a=bal,ext5ai=inv,c2=contrib;
    for(let y=1;y<=5;y++){ext5a=(ext5a+Math.min(c2,150000))*(1+r);ext5ai+=Math.min(c2,150000);if(salaryInc>0)c2=Math.min(c2*(1+salaryInc/100),150000);}
    let ext10=ext5a,ext10i=ext5ai,c3=c2;
    for(let y=1;y<=5;y++){ext10=(ext10+Math.min(c3,150000))*(1+r);ext10i+=Math.min(c3,150000);if(salaryInc>0)c3=Math.min(c3*(1+salaryInc/100),150000);}
    return{bal,inv,returns:bal-inv,rows,ext:[{l:`+5 yrs (${years+5} yrs)`,v:ext5a},{l:`+10 yrs (${years+10} yrs)`,v:ext10}]};
  },[yearly,years,salaryInc]);
  const ref=useRef();const cRef=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(cRef.current)cRef.current.destroy();
    cRef.current=new Chart(ref.current,{type:"bar",data:{labels:res.rows.map(d=>`Y${d.y}`),datasets:[{label:"Invested",data:res.rows.map(d=>d.inv),backgroundColor:"#B5D4F4",borderRadius:3,stack:"s"},{label:"Interest",data:res.rows.map(d=>d.interest),backgroundColor:"#1D9E75",borderRadius:3,stack:"s"}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtC(c.raw)}`}}},scales:{y:{stacked:true,ticks:{callback:v=>fmtC(v)},grid:{color:"#f0f4f8"}},x:{stacked:true,grid:{display:false},ticks:{maxRotation:45,autoSkip:true,maxTicksLimit:10}}}}});
    return()=>{if(cRef.current)cRef.current.destroy();};
  },[res.rows]);
  return <div>
    <Card>
      <div style={{fontWeight:500,fontSize:15,color:"#185FA5",marginBottom:4}}>PPF Calculator</div>
      <div style={{fontSize:12,color:"#6b7280",marginBottom:14}}>Current PPF rate: 7.1% p.a. · EEE tax-free status</div>
      <SliderRow label="Yearly Investment" value={yearly} min={500} max={150000} step={500} onChange={setYearly} display={fmt(yearly)}/>
      {yearly>=150000&&<div style={{fontSize:11,color:"#D85A30",marginTop:-10,marginBottom:10}}>Maximum limit reached (₹1,50,000/year)</div>}
      <SliderRow label="Duration" value={years} min={15} max={50} step={5} onChange={setYears} display={`${years} years`}/>
      <SliderRow label="Annual Salary Increment %" value={salaryInc} min={0} max={30} step={1} onChange={setSalaryInc} display={salaryInc===0?"Not set":`${salaryInc}%/year`}/>
      {salaryInc>0&&<div style={{fontSize:12,color:"#185FA5",background:"#E6F1FB",borderRadius:8,padding:"8px",marginTop:-8,marginBottom:10}}>PPF contribution will increase with your salary but capped at ₹1.5L/year</div>}
    </Card>
    <Card>
      <div style={{fontWeight:500,marginBottom:4}}>Results at {years} years</div>
      <ResultRow label="Total Invested" value={fmtC(res.inv)}/>
      <ResultRow label="Interest Earned" value={fmtC(res.returns)}/>
      <ResultRow label="Maturity Amount" value={fmtC(res.bal)} highlight/>
      <ResultRow label="Tax saved (30% slab)" value={fmtC(res.inv*0.3)}/>
      <div style={{marginTop:12,overflowX:"auto"}}><canvas ref={ref} width={300} height={160}/></div>
    </Card>
    <Card>
      <div style={{fontWeight:500,marginBottom:10}}>Extension scenarios</div>
      {res.ext.map((e,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"0.5px solid #f0f4f8"}}>
        <span style={{fontSize:13,color:"#6b7280"}}>{e.l}</span>
        <span style={{fontWeight:500,color:"#185FA5"}}>{fmtC(e.v)}</span>
      </div>)}
      <div style={{marginTop:10,background:"#E1F5EE",borderRadius:8,padding:"10px",fontSize:12,color:"#085041",lineHeight:1.6}}>PPF is 100% tax-free (EEE status). Ideal for conservative long-term wealth building.</div>
    </Card>
  </div>;
}

// ── CORPUS CALCULATOR ──
function CorpusCalc(){
  const[mode,setMode]=useState("build");
  const[targetCorpus,setTargetCorpus]=useState(10000000);
  const[monthly,setMonthly]=useState(10000);
  const[rate,setRate]=useState(12);
  const[years,setYears]=useState(20);
  const[inflation,setInflation]=useState(6);
  const milestones=[{l:"25L",v:2500000},{l:"50L",v:5000000},{l:"1Cr",v:10000000},{l:"2Cr",v:20000000},{l:"5Cr",v:50000000}];
  const build=useMemo(()=>{
    const r=rate/100/12;const n=years*12;
    const fv=monthly*((Math.pow(1+r,n)-1)/r)*(1+r);
    const realFv=fv/Math.pow(1+inflation/100,years);
    const realRate=(((1+rate/100)/(1+inflation/100))-1)*100;
    const rows=[];
    for(let y=1;y<=years;y++){const ny=y*12;const nf=monthly*((Math.pow(1+r,ny)-1)/r)*(1+r);const inv=monthly*ny;rows.push({y,inv,nomFv:nf,realV:nf/Math.pow(1+inflation/100,y),gain:nf-inv});}
    return{fv,realFv,invested:monthly*n,returns:fv-monthly*n,realRate,rows};
  },[monthly,rate,years,inflation]);
  const target=useMemo(()=>{
    const r=rate/100/12;const n=years*12;
    const needed=targetCorpus/((((Math.pow(1+r,n)-1)/r)*(1+r)));
    const realFv=targetCorpus/Math.pow(1+inflation/100,years);
    const rows=[];
    for(let y=1;y<=years;y++){const ny=y*12;const nf=needed*((Math.pow(1+r,ny)-1)/r)*(1+r);const inv=needed*ny;rows.push({y,inv,nomFv:nf,realV:nf/Math.pow(1+inflation/100,y),gain:nf-inv});}
    return{needed,invested:needed*n,returns:targetCorpus-needed*n,realFv,rows};
  },[targetCorpus,rate,years,inflation]);
  const activeRows=mode==="build"?build.rows:target.rows;
  return <div>
    <Card>
      <div style={{fontWeight:500,fontSize:15,color:"#185FA5",marginBottom:12}}>Corpus & Investment Calculator</div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button onClick={()=>setMode("build")} style={{flex:1,padding:"8px",border:"0.5px solid",borderRadius:8,fontWeight:500,fontSize:12,background:mode==="build"?"#185FA5":"transparent",color:mode==="build"?"#fff":"#6b7280",borderColor:mode==="build"?"#185FA5":"#dde3ea"}}>I want to invest monthly</button>
        <button onClick={()=>setMode("target")} style={{flex:1,padding:"8px",border:"0.5px solid",borderRadius:8,fontWeight:500,fontSize:12,background:mode==="target"?"#185FA5":"transparent",color:mode==="target"?"#fff":"#6b7280",borderColor:mode==="target"?"#185FA5":"#dde3ea"}}>I have a target corpus</button>
      </div>
      {mode==="build"?<SliderRow label="Monthly Investment" value={monthly} min={500} max={200000} step={500} onChange={setMonthly} display={fmt(monthly)}/>:<>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {milestones.map(m=><button key={m.v} onClick={()=>setTargetCorpus(m.v)} style={{padding:"4px 10px",borderRadius:20,border:"0.5px solid",fontSize:12,background:targetCorpus===m.v?"#185FA5":"transparent",color:targetCorpus===m.v?"#fff":"#6b7280",borderColor:targetCorpus===m.v?"#185FA5":"#dde3ea"}}>{m.l}</button>)}
        </div>
        <SliderRow label="Target corpus" value={targetCorpus} min={500000} max={100000000} step={500000} onChange={setTargetCorpus} display={fmtC(targetCorpus)}/>
      </>}
      <SliderRow label="Expected Annual Return" value={rate} min={6} max={30} step={0.5} onChange={setRate} display={`${rate}% p.a.`}/>
      <SliderRow label="Investment Duration" value={years} min={1} max={40} step={1} onChange={setYears} display={`${years} years`}/>
      <SliderRow label="Expected Inflation" value={inflation} min={3} max={10} step={0.5} onChange={setInflation} display={`${inflation}% p.a.`}/>
    </Card>
    {mode==="build"?<Card>
      <div style={{fontWeight:500,marginBottom:4}}>Your corpus projection</div>
      <ResultRow label="Total Invested" value={fmtC(build.invested)}/>
      <ResultRow label="Returns Earned" value={fmtC(build.returns)}/>
      <ResultRow label="Nominal Corpus" value={fmtC(build.fv)} highlight/>
      <ResultRow label={`Real Value (today's ₹, ${inflation}% inflation)`} value={fmtC(build.realFv)}/>
      <ResultRow label="Real Rate of Return" value={`${build.realRate.toFixed(1)}% p.a.`}/>
      <div style={{marginTop:10,overflowX:"auto"}}><BarChart invested={build.invested} returns={build.returns}/></div>
    </Card>:<Card>
      <div style={{fontWeight:500,marginBottom:4}}>How much to invest monthly?</div>
      <ResultRow label="Monthly SIP Required" value={fmt(target.needed)} highlight/>
      <ResultRow label="Total You'll Invest" value={fmtC(target.invested)}/>
      <ResultRow label="Returns Earned" value={fmtC(Math.max(target.returns,0))}/>
      <ResultRow label="Target Corpus" value={fmtC(targetCorpus)}/>
      <ResultRow label={`Real Value (today's ₹)`} value={fmtC(target.realFv)}/>
      <div style={{marginTop:10,background:"#FAEEDA",borderRadius:8,padding:"10px",fontSize:12,color:"#412402",lineHeight:1.6}}>
        To reach <strong>{fmtC(targetCorpus)}</strong> in {years} years at {rate}%, invest <strong>{fmt(target.needed)}/month</strong>. In today's money: <strong>{fmtC(target.realFv)}</strong>.
      </div>
    </Card>}
    <Card>
      <div style={{fontWeight:500,marginBottom:10}}>Year-by-year breakdown (with inflation)</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",fontSize:12,tableLayout:"fixed",minWidth:380}}>
          <thead><tr style={{background:"#f8fafc"}}>
            {["Year","Invested","Nominal","Real Value","Gain"].map((h,i)=><th key={h} style={{padding:"7px 6px",textAlign:i===0?"left":"right",color:"#6b7280",fontWeight:500,borderBottom:"0.5px solid #dde3ea",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>{activeRows.map((row,i)=><tr key={row.y} style={{background:i%2===0?"#fff":"#fafafa"}}>
            <td style={{padding:"6px",fontWeight:500,color:"#374151"}}>Yr {row.y}</td>
            <td style={{padding:"6px",textAlign:"right",color:"#6b7280"}}>{fmtC(row.inv)}</td>
            <td style={{padding:"6px",textAlign:"right",color:"#185FA5",fontWeight:500}}>{fmtC(row.nomFv)}</td>
            <td style={{padding:"6px",textAlign:"right",color:"#D85A30"}}>{fmtC(row.realV)}</td>
            <td style={{padding:"6px",textAlign:"right",color:"#1D9E75"}}>{fmtC(row.gain)}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </Card>
    <Card mb="0">
      <div style={{fontWeight:500,marginBottom:10}}>Corpus milestones at {rate}% / {years} yrs</div>
      {milestones.map(m=>{const r=rate/100/12;const n=months=>m.v/((((Math.pow(1+r,months)-1)/r)*(1+r)));return <div key={m.v} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"0.5px solid #f0f4f8"}}>
        <span style={{fontSize:13,fontWeight:500}}>{m.l} corpus</span>
        <span style={{fontSize:13,color:"#185FA5"}}>{fmt(n(years*12))}/month</span>
      </div>;})}
    </Card>
  </div>;
}

// ── STATEMENT DOWNLOAD ──
function downloadCSV(transactions,members){
  const headers=["Name/Note","Category","Type","Member","Date","Time","Amount(₹)"];
  const rows=transactions.map(tx=>{
    const m=members.find(m=>m.id===tx.memberId);
    return[tx.note||"",tx.category,tx.type,m?.name||"",tx.date,tx.time||"",tx.amount].map(v=>`"${v}"`).join(",");
  });
  const csv=[headers.join(","),...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`MoFolio_Statement_${new Date().toISOString().split("T")[0]}.csv`;a.click();
  URL.revokeObjectURL(url);
}

// ── AI FINANCE BOT ──
function FinanceBot({state}){
  const[msgs,setMsgs]=useState([{role:"assistant",text:"Hi! I'm your MoFolio finance assistant. Ask me anything about your finances, budgeting, investments, or savings goals!"}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const endRef=useRef();
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const totalIncome=state.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense=state.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const savings=totalIncome-totalExpense;
  const expByCat={};
  state.transactions.filter(t=>t.type==="expense").forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
  const topExpenses=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}: ₹${Math.round(v)}`).join(", ");

  const systemPrompt=`You are MoFolio's personal finance assistant for an Indian user. Be concise, friendly, and practical. Use ₹ for currency. The user's financial data: Total Income: ₹${Math.round(totalIncome)}, Total Expenses: ₹${Math.round(totalExpense)}, Net Savings: ₹${Math.round(savings)}, Savings Rate: ${totalIncome>0?Math.round((savings/totalIncome)*100):0}%, Top expense categories: ${topExpenses||"none yet"}, Number of goals: ${state.goals.length}, Family members: ${state.members.length}. Give actionable, specific advice based on this data. Keep responses under 150 words.`;

  const send=async()=>{
    if(!input.trim()||loading)return;
    const userMsg=input.trim();
    setInput("");
    setMsgs(m=>[...m,{role:"user",text:userMsg}]);
    setLoading(true);
    try{
      const history=msgs.slice(-6).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:systemPrompt,messages:[...history,{role:"user",content:userMsg}]})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||"Sorry, I couldn't respond right now. Please try again.";
      setMsgs(m=>[...m,{role:"assistant",text:reply}]);
    }catch(e){setMsgs(m=>[...m,{role:"assistant",text:"Connection error. Please check your internet and try again."}]);}
    setLoading(false);
  };

  const suggestions=["How can I reduce my expenses?","Where should I invest my savings?","Am I on track with my goals?","Suggest a budget plan for me"];

  return <div>
    <div style={{background:"#fff",borderRadius:12,border:"0.5px solid #dde3ea",padding:"1rem",marginBottom:"1rem",minHeight:350,maxHeight:500,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
        <div style={{maxWidth:"80%",background:m.role==="user"?"#185FA5":"#f0f4f8",color:m.role==="user"?"#fff":"#1a1a1a",borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"10px 12px",fontSize:13,lineHeight:1.6}}>{m.text}</div>
      </div>)}
      {loading&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:"#f0f4f8",borderRadius:"12px 12px 12px 4px",padding:"10px 14px",fontSize:13,color:"#6b7280"}}>Thinking...</div></div>}
      <div ref={endRef}/>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
      {suggestions.map(s=><button key={s} onClick={()=>{setInput(s);}} style={{padding:"5px 10px",borderRadius:20,border:"0.5px solid #185FA5",fontSize:11,background:"#E6F1FB",color:"#185FA5",cursor:"pointer"}}>{s}</button>)}
    </div>
    <div style={{display:"flex",gap:8}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask about your finances..." style={{...iStyle,flex:1}}/>
      <button onClick={send} disabled={loading} style={{background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"0 16px",fontWeight:500,opacity:loading?0.7:1,whiteSpace:"nowrap"}}>Send</button>
    </div>
  </div>;
}

      <div style={{marginBottom:12}}><div style={{fontSize:12,color:"#6b7280",marginBottom:5}}>Message</div><textarea placeholder="Tell us what you think..." value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))} style={{...iStyle,minHeight:90,resize:"vertical",padding:"10px",lineHeight:1.6}}/></div>
      {status==="error"&&<div style={{background:"#FAECE7",borderRadius:8,padding:"8px",fontSize:13,color:"#993C1D",marginBottom:10}}>Please fill all fields and add a star rating.</div>}
      {status==="success"&&<div style={{background:"#E1F5EE",borderRadius:8,padding:"8px",fontSize:13,color:"#0F6E56",marginBottom:10}}>Thank you! Feedback sent to the developer.</div>}
      <button onClick={submit} disabled={sending} style={{width:"100%",background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontWeight:500,fontSize:14,opacity:sending?0.7:1}}>{sending?"Sending...":"Submit Feedback"}</button>
    </Card>
    {feedbacks.length>0&&<div>
      <div style={{fontWeight:500,marginBottom:10}}>All feedback ({feedbacks.length})</div>
      {feedbacks.map(fb=><Card key={fb.id} mb="8px">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:"#B5D4F4",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500,fontSize:12,color:"#0C447C"}}>{fb.name[0].toUpperCase()}</div>
            <div><div style={{fontWeight:500,fontSize:13}}>{fb.name}</div><div style={{fontSize:11,color:"#9ca3af"}}>{fb.date}</div></div>
          </div>
          <div style={{textAlign:"right"}}>
            <span style={{fontSize:11,padding:"2px 7px",borderRadius:20,background:fb.type==="bug"?"#FAECE7":fb.type==="suggestion"?"#EEEDFE":"#E6F1FB",color:fb.type==="bug"?"#993C1D":fb.type==="suggestion"?"#534AB7":"#185FA5",display:"block",marginBottom:4}}>{typeLabels[fb.type]}</span>
            <span style={{color:"#BA7517",fontSize:13}}>{"★".repeat(fb.rating)}{"☆".repeat(5-fb.rating)}</span>
          </div>
        </div>
        <div style={{fontSize:13,color:"#374151",lineHeight:1.6,paddingLeft:42}}>{fb.message}</div>
      </Card>)}
    </div>}
  </div>;
}

// ── MAIN APP ──
function App(){
  const[tab,setTab]=useState("dashboard");
  const[state,setState]=useState(load);
  useEffect(()=>save(state),[state]);
  useEffect(()=>{
    const onVisible=()=>{if(document.visibilityState==="visible"){const saved=load();setState(s=>({...s,...saved}));}};
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[]);
  const tabs=[
    {id:"dashboard",label:"Home"},
    {id:"transactions",label:"Transactions"},
    {id:"members",label:"Family"},
    {id:"goals",label:"Goals"},
    {id:"invest",label:"Invest"},
    {id:"calculators",label:"Calculators"},
    {id:"bot",label:"AI Bot"},
    {id:"feedback",label:"Feedback"},
    {id:"profile",label:"Profile"},
  ];
  const totalIncome=useMemo(()=>state.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),[state.transactions]);
  const totalExpense=useMemo(()=>state.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),[state.transactions]);
  const savings=totalIncome-totalExpense;
  const profile=state.profile||{};
  const initials=profile.name?profile.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2):"?";
  return <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",minHeight:"100vh",background:"#f0f4f8",paddingBottom:"2rem"}}>
    <div style={{background:"#185FA5",padding:"1rem 1rem 0",color:"#fff"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.75rem"}}>
        <div>
          <div style={{fontSize:20,fontWeight:500}}>MoFolio</div>
          <div style={{fontSize:12,opacity:0.8}}>Personal & Family Finance</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>downloadCSV(state.transactions,state.members)} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:12,cursor:"pointer"}}>↓ Statement</button>
          <div onClick={()=>setTab("profile")} style={{width:34,height:34,borderRadius:"50%",background:"rgba(255,255,255,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500,fontSize:13,cursor:"pointer"}}>{initials}</div>
        </div>
      </div>
      <div className="tabs-scroll">
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn" style={{background:tab===t.id?"#fff":"transparent",color:tab===t.id?"#185FA5":"#fff"}}>{t.label}</button>)}
      </div>
    </div>
    <div style={{padding:"1rem"}}>
      {tab==="dashboard"&&<Dashboard state={state} totalIncome={totalIncome} totalExpense={totalExpense} savings={savings} setTab={setTab}/>}
      {tab==="transactions"&&<Transactions state={state} setState={setState}/>}
      {tab==="members"&&<Members state={state} setState={setState}/>}
      {tab==="goals"&&<Goals state={state} setState={setState} savings={savings}/>}
      {tab==="invest"&&<Invest savings={savings}/>}
      {tab==="calculators"&&<Calculators/>}
      {tab==="bot"&&<FinanceBot state={state}/>}
      {tab==="feedback"&&<Feedback state={state} setState={setState}/>}
      {tab==="profile"&&<Profile state={state} setState={setState} setTab={setTab}/>}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
